name: Build SafeWalker Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Setup Forge workspace
      run: ./gradlew setupDecompWorkspace --no-daemon
      
    - name: Build mod
      run: ./gradlew build --no-daemon
      
    - name: Upload built mod
      uses: actions/upload-artifact@v4
      with:
        name: SafeWalker-Mod
        path: build/libs/*.jar
